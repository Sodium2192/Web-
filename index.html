<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy AI Chat & Encyclopedia</title>
  <style>
    /* Global Reset & Typography */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Deep Space Purple/Blue Galaxy Background */
    body {
      background: radial-gradient(ellipse at bottom, #0f172a 0%, #020617 100%);
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      overflow: hidden;
      position: relative;
    }

    /* Starfield Dot Effects */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        radial-gradient(1px 1px at 30px 40px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 150px 180px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 280px 120px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 80px 320px, rgba(255,255,255,0.7), rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 350px 250px, #ffffff, rgba(0,0,0,0));
      background-size: 400px 400px;
      opacity: 0.5;
      z-index: 1;
    }

    /* Cosmic Nebula Overlays */
    .nebula-1 {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 35%, rgba(147, 51, 234, 0.25), transparent 60%);
      z-index: 2;
    }
    .nebula-2 {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 65%, rgba(59, 130, 246, 0.18), transparent 60%);
      z-index: 2;
    }

    /* Layout Main Container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Green Rectangle Start Button (No Rounded Corners) */
    .start-btn {
      width: 260px;
      padding: 16px 0;
      background-color: #10b981;
      color: #020617;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 2px solid rgba(167, 243, 208, 0.3);
      border-radius: 0px !important;
      cursor: pointer;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.45);
      transition: all 0.2s ease;
    }
    .start-btn:hover {
      background-color: #34d399;
      box-shadow: 0 0 45px rgba(52, 211, 153, 0.6);
    }
    .start-btn:active { transform: scale(0.97); }

    /* AI Chat Window Dashboard */
    .chat-window {
      display: none;
      width: 100%;
      height: 550px;
      background-color: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 0px !important;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.35s ease-out forwards;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: rgba(2, 6, 23, 0.4);
    }
    .online-indicator {
      width: 10px;
      height: 10px;
      background-color: #10b981;
      border-radius: 50%;
    }
    .chat-title {
      color: #d8b4fe;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-row { display: flex; width: 100%; }
    .row-ai { justify-content: flex-start; }
    .row-user { justify-content: flex-end; }

    .bubble {
      max-width: 85%;
      padding: 12px 18px;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 0px !important;
      text-align: left;
    }
    .bubble-ai {
      background-color: #090d16;
      border: 1px solid rgba(147, 51, 234, 0.4);
      color: #f3e8ff;
    }
    .bubble-user {
      background-color: #7e22ce;
      border: 1px solid rgba(168, 85, 247, 0.5);
      color: #ffffff;
    }

    .chat-form {
      padding: 16px;
      border-top: 1px solid rgba(168, 85, 247, 0.2);
      display: flex;
      gap: 10px;
      background-color: rgba(2, 6, 23, 0.4);
    }
    .chat-input {
      flex: 1;
      background-color: #020617;
      color: #f3e8ff;
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
    }
    .chat-input:focus { border-color: #10b981; }
    .chat-input::placeholder { color: rgba(168, 85, 247, 0.4); }
    
    .send-btn {
      padding: 0 24px;
      background-color: #10b981;
      color: #020617;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .send-btn:hover { background-color: #34d399; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="nebula-1"></div>
  <div class="nebula-2"></div>

  <div class="container">
    <!-- 1. START SCREEN -->
    <div id="start-screen">
      <button id="start-btn" class="start-btn">START AI CHAT</button>
    </div>

    <!-- 2. AI CHAT WINDOW (All English UI) -->
    <div id="chat-screen" class="chat-window">
      <div class="chat-header">
        <div class="online-indicator"></div>
        <div class="chat-title">Cosmos Intelligence</div>
      </div>

      <div id="chat-messages" class="chat-messages">
        <div class="message-row row-ai">
          <div class="bubble bubble-ai">
            System online. Database loaded successfully. You can ask me math questions or knowledge facts like "Who made this?" or "Who is the CEO of Roblox?".
          </div>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <input type="text" id="chat-input" class="chat-input" placeholder="Ask a question or enter math..." required autocomplete="off" />
        <button type="submit" class="send-btn">Send</button>
      </form>
    </div>
  </div>

  <script>
    const startScreen = document.getElementById('start-screen');
    const chatScreen = document.getElementById('chat-screen');
    const startBtn = document.getElementById('start-btn');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    // 1. Upgraded English Knowledge Base
    const generalKnowledgeDB = [
      {
        keywords: ["who make", "who made", "creator", "developer", "owner"],
        answer: "Jacky made it!"
      },
      {
        keywords: ["roblox", "ceo"],
        answer: "The co-founder and current CEO of Roblox is David Baszucki. His in-game username is Builderman."
      },
      {
        keywords: ["hello", "hi", "hey"],
        answer: "Hello! Welcome to the interstellar AI system. How can I assist you today?"
      },
      {
        keywords: ["who are you", "your name"],
        answer: "I am Cosmos Intelligence, a smart web assistant running live on Vercel cloud hosting."
      },
      {
        keywords: ["apple", "tim cook"],
        answer: "The current CEO of Apple is Tim Cook."
      },
      {
        keywords: ["tesla", "musk", "spacex"],
        answer: "The CEO of Tesla and SpaceX is Elon Musk."
      }
    ];

    // 2. Core Intelligent Processor
    function processAiResponse(input) {
      let cleanInput = input.trim().toLowerCase();

      // Check Encyclopedia Database with smart fuzzy matching
      for (let item of generalKnowledgeDB) {
        let isMatch = item.keywords.every(keyword => cleanInput.includes(keyword)) || 
                      item.keywords.some(keyword => cleanInput === keyword || cleanInput.startsWith(keyword));
        if (isMatch) {
          return item.answer;
        }
      }

      // Check if it's a basic math calculation problem
      let mathExpression = cleanInput.replace(/[^0-9+\-*/().]/g, '');
      if (mathExpression.length > 0 && /[0-9]/.test(mathExpression)) {
        try {
          const result = new Function(`return ${mathExpression}`)();
          if (result !== undefined && !isNaN(result)) {
            return `🪐 Calculation Result:\n${input} = ${result}`;
          }
        } catch (e) {}
      }

      // Default Response fallback in English
      return `Received signal: "${input}".\nI am currently running on a local local-database. If you want me to answer complex questions like a real ChatGPT, we can connect an OpenAI API key. Would you like to upgrade this now?`;
    }

    // Toggle Screen Interface
    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
    });

    // Form Submit Transmission Handling
    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;

      // Render User Message
      const uRow = document.createElement('div');
      uRow.className = 'message-row row-user';
      const uBubble = document.createElement('div');
      uBubble.className = 'bubble bubble-user';
      uBubble.textContent = text;
      uRow.appendChild(uBubble);
      chatMessages.appendChild(uRow);

      chatInput.value = '';
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // Render AI Response after short delay
      setTimeout(() => {
        const aiAnswer = processAiResponse(text);

        const aRow = document.createElement('div');
        aRow.className = 'message-row row-ai';
        const aBubble = document.createElement('div');
        aBubble.className = 'bubble bubble-ai';
        aBubble.textContent = aiAnswer;
        aRow.appendChild(aBubble);
        chatMessages.appendChild(aRow);
        
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 550);
    });
  </script>
</body>
</html>
