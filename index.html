<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy AI Chat</title>
  <!-- Load Tailwind CSS via CDN -->
  <script src="jsdelivr.net"></script>
  <style>
    /* Galaxy Starfield Background Styling */
    .galaxy-bg {
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      overflow: hidden;
    }
    
    /* CSS-generated stars */
    .stars {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: transparent url('data:image/svg+xml;utf8,<svg xmlns="w3.org" width="200" height="200" viewBox="0 0 200 200"><circle cx="20" cy="30" r="1" fill="white" opacity="0.8"/><circle cx="130" cy="40" r="1.5" fill="white" opacity="0.4"/><circle cx="75" cy="110" r="1" fill="white" opacity="0.9"/><circle cx="180" cy="170" r="1" fill="white" opacity="0.5"/><circle cx="45" cy="160" r="1.5" fill="white" opacity="0.7"/></svg>') repeat;
      z-index: 1;
    }

    /* Custom fade-in for the chat appearance */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="galaxy-bg relative min-h-screen w-full flex items-center justify-center font-sans text-white m-0">

  <!-- Deep Space Nebula Overlays -->
  <div class="stars"></div>
  <div class="absolute inset-0 z-2 bg-[radial-gradient(circle_at_30%_40%,rgba(147,51,234,0.15),transparent_50%)]"></div>
  <div class="absolute inset-0 z-2 bg-[radial-gradient(circle_at_70%_70%,rgba(59,130,246,0.12),transparent_60%)]"></div>

  <!-- Interactive Area Container -->
  <div class="relative z-10 w-full max-w-lg px-4 flex flex-col items-center justify-center">
    
    <!-- RECTANGLE START SCREEN -->
    <div id="start-screen" class="flex flex-col items-center justify-center w-full">
      <button id="start-btn" class="w-64 py-4 bg-emerald-500 hover:bg-emerald-400 active:scale-98 text-slate-950 text-xl font-bold rounded-none shadow-[0_0_25px_rgba(16,185,129,0.3)] transition-all duration-200 tracking-wider uppercase border border-emerald-300/20">
        Start AI Chat
      </button>
    </div>

    <!-- AI CHAT SCREEN (Hidden initially) -->
    <div id="chat-screen" class="hidden w-full h-[550px] bg-slate-950/80 backdrop-blur-md border border-purple-500/30 rounded-none flex flex-col shadow-2xl animate-fade-in">
      
      <!-- Chat Header -->
      <div class="px-6 py-4 border-b border-purple-500/20 flex items-center gap-3 bg-slate-900/50">
        <div class="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse"></div>
        <h2 class="text-purple-200 font-medium tracking-wide text-sm uppercase">Cosmos Intelligence</h2>
      </div>

      <!-- Message Area -->
      <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4">
        <!-- AI Response Bubble -->
        <div class="flex justify-start">
          <div class="max-w-[85%] px-4 py-3 bg-slate-900 border border-purple-900/60 text-purple-100 rounded-none text-sm leading-relaxed">
            System Online. Transmission stable. How can I assist your cosmic inquiry today?
          </div>
        </div>
      </div>

      <!-- Input Form Layout -->
      <form id="chat-form" class="p-4 border-t border-purple-500/20 flex gap-2 bg-slate-900/30">
        <input type="text" id="chat-input" placeholder="Type a transmission..." required autocomplete="off"
          class="flex-1 bg-slate-950 text-purple-100 placeholder-purple-400/30 px-4 py-3 rounded-none border border-purple-500/20 focus:outline-none focus:border-emerald-500 transition-colors text-sm" />
        <button type="submit" class="px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold rounded-none text-sm uppercase tracking-wider transition-colors">
          Send
        </button>
      </form>

    </div>
  </div>

  <!-- JavaScript Application Logic -->
  <script>
    const startScreen = document.getElementById('start-screen');
    const chatScreen = document.getElementById('chat-screen');
    const startBtn = document.getElementById('start-btn');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    // UI View transition
    startBtn.addEventListener('click', () => {
      startScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
    });

    // Message Renderer helper
    function appendMessage(text, role) {
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

      const bubble = document.createElement('div');
      bubble.className = `max-w-[85%] px-4 py-3 text-sm leading-relaxed rounded-none ${
        role === 'user'
          ? 'bg-purple-700 border border-purple-500/40 text-white'
          : 'bg-slate-900 border border-purple-900/60 text-purple-100'
      }`;
      bubble.textContent = text;

      wrapper.appendChild(bubble);
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Input monitoring submission
    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const messageText = chatInput.value.trim();
      if (!messageText) return;

      appendMessage(messageText, 'user');
      chatInput.value = '';

      // Simulated automated space network reply
      setTimeout(() => {
        appendMessage(`Signal received: "${messageText}". Static cloud frontend connection functional. Ready for API routing configuration!`, 'ai');
      }, 950);
    });
  </script>
</body>
</html>
