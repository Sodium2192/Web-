<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy AI Chat & Encyclopedia</title>
  <style>
    /* 全域重設與字體 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* 深邃紫藍色銀河背景 */
    body {
      background: radial-gradient(ellipse at bottom, #0f172a 0%, #020617 100%);
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      overflow: hidden;
      position: relative;
    }

    /* 星空微光點綴 */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        radial-gradient(1px 1px at 30px 40px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 150px 180px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 280px 120px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 80px 320px, rgba(255,255,255,0.7), rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 350px 250px, #ffffff, rgba(0,0,0,0));
      background-size: 400px 400px;
      opacity: 0.5;
      z-index: 1;
    }

    /* 星雲色彩氛圍 */
    .nebula-1 {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 35%, rgba(147, 51, 234, 0.25), transparent 60%);
      z-index: 2;
    }
    .nebula-2 {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 65%, rgba(59, 130, 246, 0.18), transparent 60%);
      z-index: 2;
    }

    /* 介面主容器 */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 綠色長方形按鈕 */
    .start-btn {
      width: 260px;
      padding: 16px 0;
      background-color: #10b981;
      color: #020617;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 2px solid rgba(167, 243, 208, 0.3);
      border-radius: 0px !important;
      cursor: pointer;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.45);
      transition: all 0.2s ease;
    }
    .start-btn:hover {
      background-color: #34d399;
      box-shadow: 0 0 45px rgba(52, 211, 153, 0.6);
    }
    .start-btn:active { transform: scale(0.97); }

    /* AI 聊天室主架構 */
    .chat-window {
      display: none;
      width: 100%;
      height: 550px;
      background-color: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 0px !important;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.35s ease-out forwards;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: rgba(2, 6, 23, 0.4);
    }
    .online-indicator {
      width: 10px;
      height: 10px;
      background-color: #10b981;
      border-radius: 50%;
    }
    .chat-title {
      color: #d8b4fe;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-row { display: flex; width: 100%; }
    .row-ai { justify-content: flex-start; }
    .row-user { justify-content: flex-end; }

    .bubble {
      max-width: 85%;
      padding: 12px 18px;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 0px !important;
      text-align: left;
    }
    .bubble-ai {
      background-color: #090d16;
      border: 1px solid rgba(147, 51, 234, 0.4);
      color: #f3e8ff;
    }
    .bubble-user {
      background-color: #7e22ce;
      border: 1px solid rgba(168, 85, 247, 0.5);
      color: #ffffff;
    }

    .chat-form {
      padding: 16px;
      border-top: 1px solid rgba(168, 85, 247, 0.2);
      display: flex;
      gap: 10px;
      background-color: rgba(2, 6, 23, 0.4);
    }
    .chat-input {
      flex: 1;
      background-color: #020617;
      color: #f3e8ff;
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
    }
    .chat-input:focus { border-color: #10b981; }
    .chat-input::placeholder { color: rgba(168, 85, 247, 0.4); }
    
    .send-btn {
      padding: 0 24px;
      background-color: #10b981;
      color: #020617;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .send-btn:hover { background-color: #34d399; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="nebula-1"></div>
  <div class="nebula-2"></div>

  <div class="container">
    <div id="start-screen">
      <button id="start-btn" class="start-btn">START AI CHAT</button>
    </div>

    <div id="chat-screen" class="chat-window">
      <div class="chat-header">
        <div class="online-indicator"></div>
        <div class="chat-title">Cosmos Intelligence</div>
      </div>

      <div id="chat-messages" class="chat-messages">
        <div class="message-row row-ai">
          <div class="bubble bubble-ai">
            系統已更新！我現在內建了網路常識與百科資料庫。你可以問我數學題、或者「誰是 Roblox 的 CEO？」試試看！
          </div>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <input type="text" id="chat-input" class="chat-input" placeholder="問我任何常識問題或輸入計算題..." required autocomplete="off" />
        <button type="submit" class="send-btn">發送</button>
      </form>
    </div>
  </div>

  <script>
    const startScreen = document.getElementById('start-screen');
    const chatScreen = document.getElementById('chat-screen');
    const startBtn = document.getElementById('start-btn');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    // 1. 本地擴充常識資料庫
    const generalKnowledgeDB = [
      {
        keywords: ["roblox", "ceo", "執行長", "老闆"],
        answer: "Roblox 的共同創辦人兼現任 CEO 是 David Baszucki（大衛·巴祖奇），他在網路上的使用者名稱是 Builderman。"
      },
      {
        keywords: ["你好", "hello", "hi"],
        answer: "你好！歡迎連線到星際 AI 系統，很高興為你服務。"
      },
      {
        keywords: ["你是誰", "who are you"],
        answer: "我是 Cosmos Intelligence，一個部署在 Vercel 上的智慧靜態前端網頁助手。"
      },
      {
        keywords: ["apple", "蘋果", "tim cook"],
        answer: "Apple 的現任 CEO 是 Tim Cook（蒂姆·庫克）。"
      },
      {
        keywords: ["tesla", "特斯​​拉", "musk", "馬斯克"],
        answer: "Tesla 和 SpaceX 的執行長（CEO）是著名企業家 Elon Musk（伊隆·馬斯克）。"
      }
    ];

    // 2. 核心大腦解析引擎 (包含關鍵字模糊比對與四則運算)
    function processAiResponse(input) {
      let cleanInput = input.trim().toLowerCase();

      // 先跑一遍資料庫比對：如果句子包含該主題的關鍵字組合（例如同時有 roblox 和 ceo）
      for (let item of generalKnowledgeDB) {
        let isMatch = item.keywords.every(keyword => cleanInput.includes(keyword)) || 
                      (item.keywords.includes(cleanInput));
        if (isMatch) {
          return item.answer;
        }
      }

      // 如果不是常識，檢查是否是純四則運算題
      let mathExpression = cleanInput.replace(/[^0-9+\-*/().]/g, '');
      if (mathExpression.length > 0 && /[0-9]/.test(mathExpression)) {
        try {
          const result = new Function(`return ${mathExpression}`)();
          if (result !== undefined && !isNaN(result)) {
            return `🪐 運算分析結果：\n${input} = ${result}`;
          }
        } catch (e) {}
      }

      // 預設未知回覆
      return `已接收到指令："${input}"。\n目前我是基於網頁本地資料庫庫運行，如果需要我像真正的 ChatGPT 一樣回答世界上「所有」天馬行空的問題，我們可以為網頁添加一段 OpenAI API 密鑰程式碼，你想現在升級串接嗎？`;
    }

    // 切換畫面
    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
    });

    // 表單發送
    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;

      // 畫面上渲染使用者問題
      const uRow = document.createElement('div');
      uRow.className = 'message-row row-user';
      const uBubble = document.createElement('div');
      uBubble.className = 'bubble bubble-user';
      uBubble.textContent = text;
      uRow.appendChild(uBubble);
      chatMessages.appendChild(uRow);

      chatInput.value = '';
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // 延時後渲染 AI 分析解答
      setTimeout(() => {
        const aiAnswer = processAiResponse(text);

        const aRow = document.createElement('div');
        aRow.className = 'message-row row-ai';
        const aBubble = document.createElement('div');
        aBubble.className = 'bubble bubble-ai';
        aBubble.textContent = aiAnswer;
        aRow.appendChild(aBubble);
        chatMessages.appendChild(aRow);
        
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 550);
    });
  </script>
</body>
</html>
