<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy AI Chat</title>
  <script src="jsdelivr.net"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
  </style>
</head>
<body class="relative min-h-screen w-full flex items-center justify-center overflow-hidden bg-slate-950 font-sans text-white">
  <div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_50%_50%,rgba(120,119,198,0.3),rgba(255,255,255,0))]"></div>
  <div class="absolute top-[-10%] left-[-10%] h-[500px] w-[500px] rounded-full bg-purple-900/30 blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] h-[500px] w-[500px] rounded-full bg-indigo-900/30 blur-[120px]"></div>

  <div class="relative z-10 w-full max-w-lg px-4 flex flex-col items-center justify-center">
    <div id="start-screen" class="flex flex-col items-center justify-center">
      <button id="start-btn" class="px-10 py-5 bg-emerald-500 hover:bg-emerald-400 active:scale-95 text-slate-950 text-2xl font-bold rounded-full shadow-[0_0_30px_rgba(16,185,129,0.5)] transition-all duration-300 tracking-wide uppercase">
        Start Chat
      </button>
    </div>

    <div id="chat-screen" class="hidden w-full h-[550px] bg-slate-900/80 backdrop-blur-xl border border-purple-500/20 rounded-2xl flex flex-col shadow-2xl animate-fade-in">
      <div class="px-6 py-4 border-b border-purple-500/20 flex items-center gap-3">
        <div class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></div>
        <h2 class="text-purple-200 font-semibold tracking-wide">AI Assistant</h2>
      </div>
      <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4">
        <div class="flex justify-start">
          <div class="max-w-[85%] px-4 py-3 rounded-2xl text-sm leading-relaxed bg-slate-800 text-purple-100 border border-purple-900/50 rounded-tl-none">
            Hello! I am your AI assistant. How can I help you today?
          </div>
        </div>
      </div>
      <form id="chat-form" class="p-4 border-t border-purple-500/20 flex gap-2">
        <input type="text" id="chat-input" placeholder="Type your message..." required autocomplete="off"
          class="flex-1 bg-slate-950 text-purple-100 placeholder-purple-400/50 px-4 py-3 rounded-xl border border-purple-500/20 focus:outline-none focus:border-emerald-500 transition-colors text-sm text-black" />
        <button type="submit" class="px-5 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-semibold rounded-xl text-sm transition-colors">
          Send
        </button>
      </form>
    </div>
  </div>

  <script>
    const startScreen = document.getElementById('start-screen');
    const chatScreen = document.getElementById('chat-screen');
    const startBtn = document.getElementById('start-btn');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    startBtn.addEventListener('click', () => {
      startScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
    });

    function appendMessage(text, role) {
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
      const bubble = document.createElement('div');
      bubble.className = `max-w-[85%] px-4 py-3 rounded-2xl text-sm leading-relaxed ${
        role === 'user' ? 'bg-purple-600 text-white rounded-tr-none' : 'bg-slate-800 text-purple-100 border border-purple-900/50 rounded-tl-none'
      }`;
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const messageText = chatInput.value.trim();
      if (!messageText) return;
      appendMessage(messageText, 'user');
      chatInput.value = '';
      setTimeout(() => {
        appendMessage(`You said: "${messageText}". This is a static frontend reply!`, 'ai');
      }, 1000);
    });
  </script>
</body>
</html>
