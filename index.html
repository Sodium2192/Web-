<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy AI Chat & OpenAI System</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at bottom, #0f172a 0%, #020617 100%);
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        radial-gradient(1px 1px at 30px 40px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 150px 180px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 280px 120px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 80px 320px, rgba(255,255,255,0.7), rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 350px 250px, #ffffff, rgba(0,0,0,0));
      background-size: 400px 400px;
      opacity: 0.5;
      z-index: 1;
    }

    .nebula-1 {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 35%, rgba(147, 51, 234, 0.25), transparent 60%);
      z-index: 2;
    }
    .nebula-2 {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 65%, rgba(59, 130, 246, 0.18), transparent 60%);
      z-index: 2;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .start-btn {
      width: 260px;
      padding: 16px 0;
      background-color: #10b981;
      color: #020617;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 2px solid rgba(167, 243, 208, 0.3);
      border-radius: 0px !important;
      cursor: pointer;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.45);
      transition: all 0.2s ease;
    }
    .start-btn:hover {
      background-color: #34d399;
      box-shadow: 0 0 45px rgba(52, 211, 153, 0.6);
    }

    .chat-window {
      display: none;
      width: 100%;
      height: 550px;
      background-color: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 0px !important;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.35s ease-out forwards;
    }

    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background-color: rgba(2, 6, 23, 0.4);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .online-indicator {
      width: 10px;
      height: 10px;
      background-color: #10b981;
      border-radius: 50%;
    }
    .chat-title {
      color: #d8b4fe;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .key-input {
      width: 100%;
      background: #020617;
      border: 2px solid #e11d48; /* 改為紅色邊框，更顯眼 */
      color: #10b981;
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-row { display: flex; width: 100%; }
    .row-ai { justify-content: flex-start; }
    .row-user { justify-content: flex-end; }

    .bubble {
      max-width: 85%;
      padding: 12px 18px;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 0px !important;
      text-align: left;
    }
    .bubble-ai {
      background-color: #090d16;
      border: 1px solid rgba(147, 51, 234, 0.4);
      color: #f3e8ff;
    }
    .bubble-user {
      background-color: #7e22ce;
      border: 1px solid rgba(168, 85, 247, 0.5);
      color: #ffffff;
    }

    .chat-form {
      padding: 16px;
      border-top: 1px solid rgba(168, 85, 247, 0.2);
      display: flex;
      gap: 10px;
      background-color: rgba(2, 6, 23, 0.4);
    }
    .chat-input {
      flex: 1;
      background-color: #020617;
      color: #f3e8ff;
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
    }
    .chat-input:focus { border-color: #10b981; }
    
    .send-btn {
      padding: 0 24px;
      background-color: #10b981;
      color: #020617;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="nebula-1"></div>
  <div class="nebula-2"></div>

  <div class="container">
    <div id="start-screen">
      <button id="start-btn" class="start-btn">START AI CHAT</button>
    </div>

    <div id="chat-screen" class="chat-window">
      <div class="chat-header">
        <div class="header-top">
          <div class="online-indicator"></div>
          <div class="chat-title">Cosmos Intelligence (OpenAI Engine)</div>
        </div>
        <!-- 上方金鑰格：加強紅色框與說明 -->
        <input type="password" id="api-key-input" class="key-input" placeholder="🔴 PASTE YOUR API KEY HERE (sk-...)" />
      </div>

      <div id="chat-messages" class="chat-messages">
        <div class="message-row row-ai">
          <div class="bubble bubble-ai">
            System Online. Custom commands active. Paste your key into the RED BOX above. Then type your questions here!
          </div>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type your question here..." required autocomplete="off" />
        <button type="submit" class="send-btn">Send</button>
      </form>
    </div>
  </div>

  <script>
    const startScreen = document.getElementById('start-screen');
    const chatScreen = document.getElementById('chat-screen');
    const startBtn = document.getElementById('start-btn');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');
    const apiKeyInput = document.getElementById('api-key-input');

    const customDatabase = [
      { keywords: ["boss", "your boss", "ur boss"], answer: "Jacky is my boss!" },
      { keywords: ["who make", "who made", "creator"], answer: "Jacky made it!" },
      { keywords: ["roblox", "ceo"], answer: "The CEO of Roblox is David Baszucki." }
    ];

    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
    });

    function appendMessage(text, role) {
      const wrapper = document.createElement('div');
      wrapper.className = `message-row ${role === 'user' ? 'row-user' : 'row-ai'}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role === 'user' ? 'bubble-user' : 'bubble-ai'}`;
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function getOpenAiResponse(userText, apiKey) {
      try {
        const response = await fetch('openai.com', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'gpt-3.5-turbo',
            messages: [{ role: 'user', content: userText }]
          })
        });

        const data = await response.json();
        if (data.choices && data.choices[0]) {
          return data.choices[0].message.content;
        } else if (data.error) {
          return `OpenAI Error: ${data.error.message}`;
        }
        return "No response received from OpenAI cloud servers.";
      } catch (err) {
        return "Failed to connect to OpenAI cloud network.";
      }
    }

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      let text = chatInput.value.trim();
      if (!text) return;

      // 防呆優化：如果使用者在對話框不小心加上了 "sk-"，自動幫他過濾掉
      if (text.toLowerCase().startsWith('sk-') && text.length > 30) {
        appendMessage("System detected: You pasted the API key into the wrong box. Please paste it into the RED box at the top instead!", 'ai');
        chatInput.value = '';
        return;
      }
      if (text.toLowerCase().startsWith('sk- ')) {
        text = text.substring(4);
      }

      appendMessage(text, 'user');
      chatInput.value = '';

      let cleanInput = text.toLowerCase();
      let foundCustomAnswer = null;

      // 1. 檢查自訂指令
      for (let item of customDatabase) {
        if (item.keywords.some(keyword => cleanInput.includes(keyword))) {
          foundCustomAnswer = item.answer;
          break;
        }
      }

      if (foundCustomAnswer) {
        setTimeout(() => { appendMessage(foundCustomAnswer, 'ai'); }, 400);
        return;
      }

      // 2. 檢查數學題
      let mathExpression = cleanInput.replace(/[^0-9+\-*/().]/g, '');
      if (mathExpression.length > 0 && /[0-9]/.test(mathExpression)) {
        try {
          const result = new Function(`return ${mathExpression}`)();
          if (result !== undefined && !isNaN(result)) {
            appendMessage(`Calculation Result: ${text} = ${result}`, 'ai');
            return;
          }
        } catch (e) {}
      }

      // 3. 呼叫 OpenAI API
      const apiKey = apiKeyInput.value.trim();
      if (apiKey.startsWith('sk-')) {
        appendMessage("Connecting to Cosmos core network...", "ai");
        const aiAnswer = await getOpenAiResponse(text, apiKey);
        
        chatMessages.lastElementChild.remove(); // 移除載入中字樣
        appendMessage(aiAnswer, 'ai');
      } else {
        setTimeout(() => {
          appendMessage(`Received signal: "${text}".\nTo answer this question via OpenAI cloud, please paste your secret API Key into the RED input box at the very top.`, 'ai');
        }, 500);
      }
    });
  </script>
</body>
</html>
