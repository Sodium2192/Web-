<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy AI Chat Engine</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at bottom, #0f172a 0%, #020617 100%);
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        radial-gradient(1px 1px at 30px 40px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 150px 180px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 280px 120px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 80px 320px, rgba(255,255,255,0.7), rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 350px 250px, #ffffff, rgba(0,0,0,0));
      background-size: 400px 400px;
      opacity: 0.5;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .start-btn {
      width: 260px;
      padding: 16px 0;
      background-color: #10b981;
      color: #020617;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 2px solid rgba(167, 243, 208, 0.3);
      border-radius: 0px;
      cursor: pointer;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.45);
      transition: all 0.2s ease;
    }

    .chat-window {
      display: none;
      width: 100%;
      height: 600px;
      background-color: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 0px;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.35s ease-out forwards;
      position: relative;
      overflow: hidden;
    }

    /* Fixed Header with Absolute Containment */
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      display: flex;
      align-items: center;
      background-color: rgba(2, 6, 23, 0.8);
      position: relative;
      z-index: 10;
      height: 60px;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .online-indicator {
      width: 10px;
      height: 10px;
      background-color: #10b981;
      border-radius: 50%;
    }
    
    .chat-title {
      color: #d8b4fe;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Force button to the top-right corner explicitly */
    .menu-btn {
      position: absolute !important;
      right: 15px !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      background: transparent !important;
      border: none !important;
      cursor: pointer !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 4px !important;
      width: 30px !important;
      height: 24px !important;
      justify-content: center !important;
      align-items: center !important;
      padding: 0 !important;
      z-index: 99999 !important;
    }
    
    .menu-btn span {
      display: block !important;
      width: 22px !important;
      height: 2px !important;
      background-color: #10b981 !important; /* Bright green lines so you can't miss them */
      transition: all 0.2s ease;
    }

    .menu-btn:hover span {
      background-color: #ffffff !important;
    }

    /* Full Window Sidebar Overlay */
    .sidebar {
      position: absolute;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100%;
      background-color: #090d16;
      border-left: 1px solid rgba(168, 85, 247, 0.3);
      z-index: 999999;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    
    .sidebar.open {
      right: 0 !important;
    }
    
    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      padding-bottom: 10px;
    }
    
    .close-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }

    .game-container {
      flex: 1;
      width: 100%;
      background: #000;
      border: 1px solid rgba(168, 85, 247, 0.2);
    }
    
    .game-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .suggestion-container {
      padding: 12px 16px;
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 10px;
      background-color: rgba(2, 6, 23, 0.3);
      border-top: 1px solid rgba(168, 85, 247, 0.1);
      scrollbar-width: none;
    }
    .suggestion-container::-webkit-scrollbar { display: none; }

    .suggest-btn {
      flex: 0 0 auto;
      background: rgba(147, 51, 234, 0.1);
      border: 1px solid rgba(147, 51, 234, 0.4);
      color: #d8b4fe;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }

    .message-row { display: flex; width: 100%; }
    .row-ai { justify-content: flex-start; }
    .row-user { justify-content: flex-end; }

    .bubble {
      max-width: 85%;
      padding: 12px 18px;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 0px;
      white-space: pre-line;
    }
    .bubble-ai {
      background-color: #090d16;
      border: 1px solid rgba(147, 51, 234, 0.4);
      color: #f3e8ff;
    }
    .bubble-user {
      background-color: #7e22ce;
      border: 1px solid rgba(168, 85, 247, 0.5);
      color: #ffffff;
    }

    .chat-form {
      padding: 16px;
      border-top: 1px solid rgba(168, 85, 247, 0.2);
      display: flex;
      gap: 10px;
      background-color: rgba(2, 6, 23, 0.4);
    }
    
    .chat-input {
      flex: 1;
      background-color: #020617;
      color: #f3e8ff;
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
    }
    
    .send-btn {
      padding: 0 24px;
      background-color: #10b981;
      color: #020617;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="start-screen">
      <button id="start-btn" class="start-btn">START AI CHAT</button>
    </div>

    <div id="chat-screen" class="chat-window">
      <div class="chat-header">
        <div class="header-left">
          <div class="online-indicator"></div>
          <div class="chat-title">Cosmos Engine</div>
        </div>
        <button class="menu-btn" id="menu-btn" type="button">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span style="font-size: 12px; font-weight: bold; color: #d8b4fe; letter-spacing: 1px;">COSMOS ARCADE</span>
          <button class="close-btn" id="close-btn" type="button">✕ CLOSE</button>
        </div>
        <div class="game-container">
          <iframe class="game-frame" src="https://www.nytimes.com/games/wordle/index.html"></iframe>
        </div>
      </div>

      <div id="chat-messages" class="chat-messages">
        <div class="message-row row-ai">
          <div class="bubble bubble-ai">
            System Online. 
            🌐 Shared Network Sync Active. Anyone can add profiles globally using **-CM [Data]**.
          </div>
        </div>
      </div>

      <div class="suggestion-container">
        <button class="suggest-btn" onclick="askQuestion('database')">Show Database</button>
        <button class="suggest-btn" onclick="askQuestion('paddy')">Paddy</button>
        <button class="suggest-btn" onclick="askQuestion('marcus')">Marcus</button>
        <button class="suggest-btn" onclick="askQuestion('boss')">Boss Info</button>
      </div>

      <form id="chat-form" class="chat-form">
        <input type="text" id="chat-input" class="chat-input" placeholder="Ask or use -CM to add globally..." required autocomplete="off" />
        <button type="submit" class="send-btn">Send</button>
      </form>
    </div>
  </div>

  <script>
    // Free cloud storage data bucket node endpoint
    const PUBLIC_API_URL = "https://kvdb.io/MN87XgS3G4V9wRshX4qS7Q/classmates_db";

    const startScreen = document.getElementById('start-screen');
    const chatScreen = document.getElementById('chat-screen');
    const startBtn = document.getElementById('start-btn');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');
    
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menu-btn');
    const closeBtn = document.getElementById('close-btn');

    const defaultDatabase = [
      { 
        keywords: ["paddy", "2d23"], 
        answer: "2D 23(麥栢林paddy)\nHobby: gooning, date with girls.\nFavourite subject: English\nCrush: 2, 3, 7, 11" 
      },
      { 
        keywords: ["marcus", "2d18"], 
        answer: "2D18(朱程諾marcus)\nHobby: attention seeking.\nFavourite subject: CHINESE HISTORY\nCrush: 2, 3, 14" 
      }
    ];

    let customDatabase = [];

    async function pullSharedDatabase() {
      try {
        let response = await fetch(PUBLIC_API_URL);
        if (response.ok) {
          customDatabase = await response.json();
        }
      } catch (e) {
        console.log("Database fetch skip.");
      }
    }

    async function pushSharedDatabase(newDataArray) {
      try {
        await fetch(PUBLIC_API_URL, {
          method: 'POST',
          body: JSON.stringify(newDataArray)
        });
      } catch (e) {
        console.error("Sync Error:", e);
      }
    }

    // Load cloud snapshot data instantly on container initialize
    pullSharedDatabase();

    // Force Open Event Listeners
    menuBtn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      sidebar.classList.add('open');
    });

    closeBtn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      sidebar.classList.remove('open');
    });

    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
    });

    function askQuestion(text) {
      handleChat(text);
    }

    function appendMessage(text, role) {
      const wrapper = document.createElement('div');
      wrapper.className = `message-row ${role === 'user' ? 'row-user' : 'row-ai'}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role === 'user' ? 'bubble-user' : 'bubble-ai'}`;
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function handleChat(text) {
      if (!text) return;
      appendMessage(text, 'user');

      await pullSharedDatabase();

      setTimeout(async () => {
        let cleanInput = text.toLowerCase().trim();
        let response = "Sector scan complete. No database match found.";

        if (cleanInput.startsWith("-cm")) {
          const entry = text.substring(3).trim(); 
          const firstWord = entry.split(" ")[0].toLowerCase(); 
          
          if(!firstWord) {
             appendMessage("Error: Missing parameters behind -CM command tag.", 'ai');
             return;
          }

          const newEntry = {
            keywords: [firstWord],
            answer: `📂 GLOBAL SYNC ENTRY:\n\n${entry}`
          };

          customDatabase.push(newEntry);
          await pushSharedDatabase(customDatabase);
          
          response = `Data verified. Profile "${firstWord}" has been synced to the server for everyone.`;
          appendMessage(response, 'ai');
          return;
        }

        const absoluteDatabase = [...defaultDatabase, ...customDatabase];

        if (cleanInput === "database" || cleanInput === "show database" || cleanInput === "global db") {
            response = "🌐 Shared Network Storage Records:\n\n" + absoluteDatabase.map(i => i.answer).join("\n\n---\n\n");
            appendMessage(response, 'ai');
            return;
        }

        let found = false;
        for (let item of absoluteDatabase) {
          if (item.keywords.some(kw => cleanInput.includes(kw))) {
            response = item.answer;
            found = true;
            break;
          }
        }
        
        if (!found) {
          if (cleanInput.includes("boss")) response = "Sahal is the boss!";
          else if (cleanInput.includes("jacky")) response = "Jacky engineered this build.";
          else if (cleanInput.includes("hello") || cleanInput.includes("hi")) response = "Greetings user.";
        }

        appendMessage(response, 'ai');
      }, 450);
    }

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      handleChat(text);
      chatInput.value = '';
    });
  </script>
</body>
</html>
